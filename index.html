<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A website to find the best spots for studying, working, relaxing, and socializing."
    />
    <meta name="author" content="Fate Owens" />
    <meta
      name="keywords"
      content="Cozy area, quiet area, study area, work area, relaxation area, social area"
    />
    <link rel="stylesheet" href="./pages/index.css" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <title>Spots</title>
  </head>
  <body>
    <div class="page">
      <header class="header">
        <img src="./images/logo.svg" alt="Spots" class="header__logo" />
      </header>
      <main class="content">
        <section class="profile page__section"></section>
        <img
          src="./images/avatar.svg"
          alt="Bessie Coleman"
          class="profile__avatar"
        />
        <div class="profile__info">
          <h1 class="profile__name">Bessie Coleman</h1>
          <p class="profile__bio">Civil Aviator</p>
          <button class="profile__edit-button">
            <img src="./images/Pencil.svg" alt="Pencil icon" />
            Edit Profile
          </button>
        </div>
        <button class="profile__add-button">
          <img src="./images/plus.svg" alt="Plus icon" />
          New Post
        </button>
        <section class="cards"></section>
      </main>
      <footer class="footer"></footer>
    </div>
  </body>
</html>
